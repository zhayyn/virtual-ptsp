version: '3.8'

services:
  # ==================== APPLICATION ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: virtual-ptsp-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - app-data:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini:ro
    depends_on:
      - mysql
      - redis
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=virtual_ptsp
      - DB_USERNAME=virtual_ptsp
      - DB_PASSWORD=${DB_PASSWORD:-secretpassword}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispass}
    networks:
      - virtual-ptsp-network

  # ==================== WEB SERVER ====================
  nginx:
    image: nginx:alpine
    container_name: virtual-ptsp-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_SSL_PORT:-443}:443"
    volumes:
      - app-data:/var/www/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - virtual-ptsp-network

  # ==================== DATABASE ====================
  mysql:
    image: mysql:8.0
    container_name: virtual-ptsp-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootsecret}
      - MYSQL_DATABASE=virtual_ptsp
      - MYSQL_USER=virtual_ptsp
      - MYSQL_PASSWORD=${DB_PASSWORD:-secretpassword}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-3306}:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - virtual-ptsp-network

  # ==================== CACHE ====================
  redis:
    image: redis:alpine
    container_name: virtual-ptsp-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - virtual-ptsp-network

  # ==================== QUEUE WORKER ====================
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: virtual-ptsp-queue
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - app-data:/var/www/html
    depends_on:
      - mysql
      - redis
    environment:
      - APP_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=virtual_ptsp
      - DB_USERNAME=virtual_ptsp
      - DB_PASSWORD=${DB_PASSWORD:-secretpassword}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispass}
    networks:
      - virtual-ptsp-network

  # ==================== SCHEDULER ====================
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: virtual-ptsp-scheduler
    restart: unless-stopped
    command: >
      sh -c "while true; do
        php artisan schedule:run;
        sleep 60;
      done"
    volumes:
      - app-data:/var/www/html
    depends_on:
      - mysql
      - redis
    environment:
      - APP_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=virtual_ptsp
      - DB_USERNAME=virtual_ptsp
      - DB_PASSWORD=${DB_PASSWORD:-secretpassword}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispass}
    networks:
      - virtual-ptsp-network

  # ==================== LICENSE SERVER (Simple) ====================
  license-server:
    image: php:apache
    container_name: virtual-ptsp-license
    restart: unless-stopped
    ports:
      - "${LICENSE_PORT:-8080}:80"
    volumes:
      - ./license-server:/var/www/html
    environment:
      - LICENSE_SECRET=${LICENSE_SECRET:-default_secret_key}
    networks:
      - virtual-ptsp-network

volumes:
  app-data:
    driver: local
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  virtual-ptsp-network:
    driver: bridge