# ============================================================
# Virtual PTSP - Nginx Configuration
# Built with ❤️ by zhayyn (+6281317361689)
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    root /var/www/html/public;

    # ============================================================
    # Logging
    # ============================================================
    access_log /var/log/nginx/virtual-ptsp-access.log;
    error_log /var/log/nginx/virtual-ptsp-error.log;

    # ============================================================
    # Security Headers (Clerk-like)
    # ============================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================================
    # Gzip Compression
    # ============================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # ============================================================
    # Index
    # ============================================================
    index index.php index.html;

    # ============================================================
    # Public Directory
    # ============================================================
    location /public {
        alias /var/www/html/storage/app/public;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ============================================================
    # Laravel Routes
    # ============================================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ============================================================
    # PHP-FPM
    # ============================================================
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # ============================================================
    # Health Check
    # ============================================================
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ============================================================
    # Deny Access to Sensitive Files
    # ============================================================
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }

    location ~ /\.git {
        deny all;
    }

    location ~ storage/.*\.key$ {
        deny all;
    }

    # ============================================================
    # Static Assets Caching
    # ============================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}